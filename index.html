<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人网站</title>
<style>
/* ===== Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
  --max-w: 880px;
  --nav-h: 56px;
  --radius: 12px;
  /* 默认/访客主题 */
  --accent: #0d9488;
  --accent-light: #ccfbf1;
  --accent-dim: #f0fdfa;
}
body{
  font-family: var(--font);
  color: #1d1d1f;
  background: #fff;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a{color:var(--accent);text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:var(--max-w);margin:0 auto;padding:0 24px}

/* ===== Picker Overlay ===== */
.picker-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#fafafa;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;
}
.picker-overlay.hidden{display:none}
.picker-title{
  font-size:clamp(1.5rem,3.5vw,2rem);
  font-weight:700;
  margin-bottom:8px;
  text-align:center;
}
.picker-sub{
  color:#6e6e73;
  margin-bottom:48px;
  text-align:center;
  font-size:0.95rem;
}
.picker-cards{
  display:flex;
  gap:24px;
  max-width:620px;
  width:100%;
  flex-wrap:wrap;
  justify-content:center;
}
.picker-card{
  flex:1;min-width:240px;max-width:280px;
  padding:40px 28px 32px;
  border-radius:var(--radius);
  background:#fff;
  border:2px solid #e5e5e5;
  cursor:pointer;
  text-align:center;
  transition:all .25s;
}
.picker-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.picker-card__icon{
  font-size:2.8rem;
  margin-bottom:16px;
}
.picker-card__title{
  font-size:1.15rem;
  font-weight:700;
  margin-bottom:6px;
}
.picker-card__desc{
  font-size:0.85rem;
  color:#6e6e73;
}
.picker-card--hr:hover{border-color:#1e40af}
.picker-card--visitor:hover{border-color:#0d9488}
.picker-skip{
  margin-top:32px;
  font-size:0.85rem;
  color:#8e8e93;
  cursor:pointer;
  background:none;border:none;
  transition:color .2s;
}
.picker-skip:hover{color:#1d1d1f}

/* ===== App Shell ===== */
#app{display:none}
#app.visible{display:block}

/* ===== Header ===== */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--nav-h);
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid #e5e5e5;
}
.header .container{
  display:flex;align-items:center;justify-content:space-between;height:100%;
}
.site-logo{
  font-size:1.1rem;font-weight:700;color:#1d1d1f;
  white-space:nowrap;
}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{
  color:#6e6e73;font-size:.88rem;transition:color .2s;
  white-space:nowrap;
}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.switch-btn{
  margin-left:8px;
  background:none;border:1.5px solid #d2d2d7;
  color:#6e6e73;font-size:.78rem;
  padding:5px 12px;border-radius:20px;
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.switch-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ===== Sections ===== */
.section{display:none;padding:80px 0}
.section.active{display:block;animation:fadeUp .4s ease}
.section--alt{background:#f5f5f7}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section__title{
  font-size:clamp(1.35rem,3.5vw,1.75rem);
  font-weight:700;
  margin-bottom:40px;
  position:relative;
  padding-bottom:14px;
}
.section__title::after{
  content:'';position:absolute;bottom:0;left:0;
  width:36px;height:3px;background:var(--accent);border-radius:2px;
}

/* ===== Hero Section ===== */
.hero-section{
  padding-top:calc(var(--nav-h) + 60px);
  padding-bottom:48px;
}
.hero-grid{
  display:flex;gap:40px;align-items:flex-start;
}
.hero-avatar{
  flex-shrink:0;
  width:120px;height:120px;border-radius:50%;
  background:#e5e5e5;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;color:#b0b0b0;
  overflow:hidden;
}
.hero-avatar img{width:100%;height:100%;object-fit:cover}
.hero-text h1{
  font-size:clamp(1.8rem,4.5vw,2.5rem);
  font-weight:700;line-height:1.25;
}
.hero-text .tagline{
  font-size:1.05rem;color:#6e6e73;
  margin-top:8px;
}
.hero-tags{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;
}
.hero-tag{
  padding:4px 14px;
  border-radius:20px;
  font-size:.82rem;
  background:var(--accent-dim);
  color:var(--accent);
  border:1px solid var(--accent-light);
}

/* ===== Card List (Timeline replacement) ===== */
.card-list{display:flex;flex-direction:column;gap:20px}
.card-item{
  background:#fff;
  border-radius:var(--radius);
  border:1px solid #e5e5e5;
  padding:24px 28px;
  transition:box-shadow .25s,transform .25s;
  position:relative;
  overflow:hidden;
}
.card-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent);border-radius:0 2px 2px 0;
}
.card-item:hover{box-shadow:0 8px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.card-item__header{
  display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;
}
.card-item__header h3{font-size:1.05rem;font-weight:600}
.card-item__header .meta{
  font-size:.85rem;color:#6e6e73;
}
.card-item__body{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid #f0f0f0;
  color:#4a4a50;
  font-size:.9rem;
  line-height:1.75;
}
.card-item__body ul{padding-left:18px}
.card-item__body li{margin-bottom:4px}

/* ===== Project Cards ===== */
.project-cards{display:flex;flex-direction:column;gap:24px}
.project-card{
  background:#fff;
  border-radius:var(--radius);
  border:1px solid #e5e5e5;
  padding:32px 32px 28px;
  transition:box-shadow .25s,transform .25s;
  position:relative;overflow:hidden;
}
.project-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.07);transform:translateY(-2px)}
.project-card--accent::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:var(--accent);border-radius:0 2px 2px 0;
}
.project-card--tint{background:#fafbfc}
.project-card__title{
  font-size:1.3rem;font-weight:700;margin-bottom:6px;
}
.project-card__meta{
  font-size:.82rem;color:#6e6e73;margin-bottom:10px;
}
.project-card__highlight{
  font-size:.92rem;font-weight:600;color:#1d1d1f;
  margin-bottom:14px;line-height:1.5;
}
.project-card__tags{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;
}
.proj-tag{
  padding:3px 12px;border-radius:20px;
  font-size:.78rem;font-weight:500;
  white-space:nowrap;
}
.proj-tag--frontend{background:#eff6ff;color:#1e40af}
.proj-tag--backend{background:#f0fdf4;color:#166534}
.proj-tag--database{background:#fff7ed;color:#c2410c}
.proj-tag--ai{background:#faf5ff;color:#7e22ce}
.proj-tag--tools{background:#fef2f2;color:#b91c1c}
.proj-tag--lang{background:#fffbeb;color:#a16207}
.proj-tag--other{background:#f5f5f7;color:#4a4a50}
.project-card__details{
  list-style:none;padding:0;
}
.project-card__details li{
  font-size:.88rem;color:#4a4a50;line-height:1.7;
  padding:2px 0 2px 18px;position:relative;
}
.project-card__details li::before{
  content:'▸';position:absolute;left:0;top:2px;
  color:var(--accent);font-size:.75rem;
}
.project-card__links{
  display:flex;gap:16px;margin-top:18px;padding-top:16px;
  border-top:1px solid #f0f0f0;
}
.project-card__links a{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.85rem;color:#6e6e73;transition:color .2s;
}
.project-card__links a:hover{color:var(--accent)}
.project-card__links a .link-icon{font-size:1rem}

/* ===== Honor Grid ===== */
.honor-divider{
  font-size:1.05rem;font-weight:700;color:#1d1d1f;
  margin:36px 0 20px;padding-top:24px;
  border-top:1px solid #e5e5e5;
}
.honor-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.honor-card{
  background:#fff;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:transform .3s,box-shadow .3s;
}
.honor-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 28px rgba(0,0,0,.12);
}
.honor-card__img{
  width:100%;height:200px;object-fit:cover;display:block;
  background:#f5f5f7;
}
.honor-card__info{padding:14px 16px 16px;text-align:center}
.honor-card__name{
  font-size:.9rem;font-weight:600;color:#1d1d1f;line-height:1.4;
}
.honor-card__sub{
  font-size:.78rem;color:#8e8e93;margin-top:4px;
}

/* ===== Cards Grid (articles) ===== */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  border-radius:var(--radius);
  border:1px solid #e5e5e5;
  padding:28px;
  transition:box-shadow .25s,transform .25s;
}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.card h3{font-size:1.05rem;font-weight:600;margin-bottom:8px}
.card .card-meta{font-size:.8rem;color:#8e8e93;margin-bottom:10px}
.card p{font-size:.88rem;color:#4a4a50;line-height:1.65}
.card .card-link{
  display:inline-block;margin-top:12px;
  font-size:.85rem;font-weight:500;
}

/* ===== Contact Cards ===== */
.contact-cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
.contact-card{
  display:flex;align-items:center;gap:16px;
  padding:20px 24px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  border:1px solid #f0f0f0;
}
.contact-card__icon{
  width:48px;height:48px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.contact-card__icon--blue{background:#eff6ff;color:#2563eb}
.contact-card__icon--green{background:#f0fdf4;color:#16a34a}
.contact-card__icon--red{background:#fef2f2;color:#dc2626}
.contact-card__label{font-size:.82rem;color:#8e8e93;margin-bottom:2px}
.contact-card__value{font-size:1.1rem;font-weight:600;color:#1d1d1f}

/* ===== Download Btn ===== */
.dl-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;
  border-radius:24px;
  background:var(--accent);
  color:#fff!important;
  font-weight:600;
  font-size:.9rem;
  transition:opacity .2s;
}
.dl-btn:hover{opacity:.85}
.dl-btn--placeholder{opacity:.5;pointer-events:none;cursor:not-allowed}

/* ===== Footer ===== */
.footer{
  padding:28px 0;
  border-top:1px solid #e5e5e5;
  text-align:center;
}
.footer p{font-size:.82rem;color:#8e8e93}

/* ===== Switch Modal ===== */
.switch-modal{
  position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.switch-modal.hidden{display:none}
.switch-modal__inner{
  background:#fff;
  border-radius:var(--radius);
  padding:36px 32px;
  max-width:540px;width:100%;
  text-align:center;
}
.switch-modal__title{
  font-size:1.2rem;font-weight:700;margin-bottom:24px;
}
.switch-modal__btns{
  display:flex;gap:16px;
  justify-content:center;
  flex-wrap:wrap;
}
.switch-modal__btn{
  flex:1;min-width:140px;max-width:200px;
  padding:24px 20px;
  border-radius:var(--radius);
  border:2px solid #e5e5e5;
  background:#fff;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--font);
  font-size:.95rem;font-weight:600;
}
.switch-modal__btn:hover{transform:translateY(-2px)}
.switch-modal__btn--hr:hover{border-color:#1e40af}
.switch-modal__btn--visitor:hover{border-color:#0d9488}
.switch-modal__cancel{
  margin-top:20px;
  background:none;border:none;
  font-size:.85rem;color:#8e8e93;
  cursor:pointer;
}
.switch-modal__cancel:hover{color:#1d1d1f}

/* ===== Theme Overrides ===== */
.theme-hr{--accent:#1e40af;--accent-light:#dbeafe;--accent-dim:#eff6ff}
.theme-visitor{--accent:#0d9488;--accent-light:#ccfbf1;--accent-dim:#f0fdfa}

/* ===== Responsive ===== */
@media(max-width:640px){
  .hero-grid{flex-direction:column;align-items:center;text-align:center}
  .hero-avatar{width:96px;height:96px}
  .hero-tags{justify-content:center}
  .section__title::after{left:50%;transform:translateX(-50%)}
  .section__title{text-align:center}
  .nav-links{gap:10px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .nav-links a{font-size:.78rem}
  .switch-btn{font-size:.7rem;padding:4px 8px;margin-left:4px}
  .section{padding:48px 0}
  .hero-section{padding-top:calc(var(--nav-h) + 36px)}
  .picker-cards{flex-direction:column;align-items:center}
  .picker-card{max-width:100%}
  .contact-cards{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
  .card-item{padding:20px}
  .card-item__header{flex-direction:column;gap:4px}
  .card-item__body{font-size:.85rem}
  .card-item__body ul{padding-left:16px}
  .card p{word-break:break-word}
  .project-card{padding:22px 20px 20px}
  .project-card__title{font-size:1.15rem}
  .project-card__tags{gap:6px}
  .proj-tag{font-size:.72rem;padding:2px 10px}
  .project-card__links{flex-wrap:wrap;gap:12px}
  .honor-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .honor-card__img{height:160px}
  .honor-card__name{font-size:.82rem}
}
@media(max-width:400px){
  .honor-grid{grid-template-columns:1fr}
}
</style>
</head>

<!-- ===== 身份选择遮罩 ===== -->
<div id="picker-overlay" class="picker-overlay">
  <h2 class="picker-title">你好，欢迎来访</h2>
  <p class="picker-sub">请选择你的身份，我会为你展示更合适的内容</p>

    <!-- HR 卡片 -->
    <div class="picker-card picker-card--hr" data-identity="hr">
      <div class="picker-card__icon">💼</div>
      <div class="picker-card__title">我是 HR / 招聘者</div>
      <div class="picker-card__desc">查看职业履历、项目成果与专业技能</div>
    </div>
    <!-- 访客卡片 -->

  <button class="picker-skip" data-identity="general">随便看看，不选择</button>
</div>

<!-- ===== 主应用容器 ===== -->
<div id="app">
  <!-- 导航栏 -->
  <header class="header">
    <div class="container">

        <nav class="nav-links" id="nav-links"><!-- JS fills --></nav>
        <button class="switch-btn" id="switch-btn" title="切换身份">切换身份</button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main id="site-content"><!-- JS fills --></main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p id="footer-text"><!-- JS fills --></p>
    </div>
  </footer>
</div>

<!-- ===== 切换身份弹窗（复用） ===== -->
<div id="switch-modal" class="switch-modal hidden">
  <div class="switch-modal__inner">
    <h3 class="switch-modal__title">切换身份</h3>
    <div class="switch-modal__btns">
      <button class="switch-modal__btn switch-modal__btn--hr" data-identity="hr">
        <div style="font-size:1.8rem;margin-bottom:4px">💼</div>
        HR / 招聘者
      </button>
      <button class="switch-modal__btn switch-modal__btn--visitor" data-identity="visitor">
        <div style="font-size:1.8rem;margin-bottom:4px">👋</div>
        同行 / 访客
      </button>
    </div>
    <button class="switch-modal__cancel" id="modal-cancel">取消</button>
  </div>
</div>

// ===========================================================================
// STATE MANAGEMENT
// ===========================================================================
const STORAGE_KEY = 'site-identity';

function getStoredIdentity() {
  try { return localStorage.getItem(STORAGE_KEY); } catch { return null; }
}
function setStoredIdentity(id) {
  try { localStorage.setItem(STORAGE_KEY, id); } catch { /* noop */ }
}

let currentIdentity = null; // 'hr' | 'visitor' | 'general'

// ===========================================================================
// RENDER
// ===========================================================================

/** 获取当前 identity 对应的数据 key（general 降级到 visitor） */
function getDataKey() {
  return currentIdentity === 'hr' ? 'hr' : 'visitor';
}

/** 设置主题色 class */
function setTheme(id) {
  const cls = document.documentElement.classList;
  cls.remove('theme-hr', 'theme-visitor');
  if (id === 'hr') cls.add('theme-hr');
  else cls.add('theme-visitor');
}

/** 渲染导航链接 */
function renderNav(data) {
  const container = document.getElementById('nav-links');
  container.innerHTML = data.nav.map(item =>
    `<a href="#${item.id}" data-nav="${item.id}">${item.label}</a>`
  ).join('');
}

/** 渲染主内容区 */
function renderSections(data) {
  const main = document.getElementById('site-content');
  let html = '';

  data.sections.forEach(sec => {
    const altClass = sec.alt ? ' section--alt' : '';
    html += `<section id="${sec.id}" class="section${altClass}"><div class="container">`;

    if (sec.title) {
      html += `<h2 class="section__title">${sec.title}</h2>`;
    }

    switch (sec.type) {
      case 'hero':
        html += sec.html;
        break;
      case 'timeline':
        html += renderTimeline(sec.items);
        if (sec.honorItems && sec.honorItems.length) {
          html += '<div class="honor-divider">🏆 荣誉与奖项</div>';
          html += renderHonors(sec.honorItems);
        }
        break;
      case 'projects':
        html += renderProjects(sec.items);
        break;
      case 'cards':
        html += renderCards(sec.items);
        break;
      case 'text':
        html += sec.html;
        break;
    }

    html += '</div></section>';
  });

  main.innerHTML = html;
}

function renderTimeline(items) {
  let html = '<div class="card-list">';
  items.forEach((item, i) => {
    html += `
      <div class="card-item">
        <div class="card-item__header">
          <h3>${item.header}</h3>
          <span class="meta">${item.meta}</span>
        </div>
        <div class="card-item__body">
          ${item.tags ? `<div class="project-card__tags" style="margin-bottom:10px">${item.tags.map(t=>`<span class="proj-tag proj-tag--${t.cat}">${t.label}</span>`).join('')}</div>` : ''}
          ${item.body}
        </div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function renderCards(items) {
  let html = '<div class="card-grid">';
  items.forEach(item => {
    html += `
      <div class="card">
        <h3>${item.title}</h3>
        <div class="card-meta">${item.meta}</div>
        ${item.tags ? `<div class="project-card__tags" style="margin-bottom:12px">${item.tags.map(t=>`<span class="proj-tag proj-tag--${t.cat}">${t.label}</span>`).join('')}</div>` : ''}
        ${item.body}
        ${item.link ? `<a class="card-link" href="${item.link}" target="_blank">查看项目 →</a>` : ''}
      </div>`;
  });
  html += '</div>';
  return html;
}

function renderProjects(items) {
  let html = '<div class="project-cards">';
  items.forEach(item => {
    const v = item.variant === 'tint' ? ' project-card--tint' : ' project-card--accent';
    html += `<div class="project-card${v}">`;
    html += `<h3 class="project-card__title">${item.title}</h3>`;
    html += `<div class="project-card__meta">${item.meta}</div>`;
    html += `<p class="project-card__highlight">${item.highlight}</p>`;
    if (item.tags && item.tags.length) {
      html += '<div class="project-card__tags">';
      item.tags.forEach(t => {
        html += `<span class="proj-tag proj-tag--${t.cat}">${t.label}</span>`;
      });
      html += '</div>';
    }
    if (item.details && item.details.length) {
      html += '<ul class="project-card__details">';
      item.details.forEach(d => {
        html += `<li>${d}</li>`;
      });
      html += '</ul>';
    }
    if (item.demoLink !== undefined || item.sourceLink !== undefined) {
      html += '<div class="project-card__links">';
      if (item.demoLink) {
        html += `<a href="${item.demoLink}" target="_blank"><span class="link-icon">🔗</span> 在线演示</a>`;
      } else if (item.demoLink === '') {
        html += `<a style="opacity:.4;cursor:not-allowed"><span class="link-icon">🔗</span> 演示（即将上线）</a>`;
      }
      if (item.sourceLink) {
        html += `<a href="${item.sourceLink}" target="_blank"><span class="link-icon">📂</span> 源代码</a>`;
      } else if (item.sourceLink === '') {
        html += `<a style="opacity:.4;cursor:not-allowed"><span class="link-icon">📂</span> 源码（即将上线）</a>`;
      }
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderHonors(items) {
  let html = '<div class="honor-grid">';
  items.forEach(item => {
    const src = `honor/${item.file}`;
    html += `
      <div class="honor-card">
        <img class="honor-card__img" src="${src}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">
        <div class="honor-card__info">
          <div class="honor-card__name">${item.name}</div>
          ${item.sub ? `<div class="honor-card__sub">${item.sub}</div>` : ''}
        </div>
      </div>`;
  });
  html += '</div>';
  return html;
}

/** 渲染页脚 */
function renderFooter() {
  const year = new Date().getFullYear();
  document.getElementById('footer-text').textContent =
    `© ${year} ${INFO.name}. All rights reserved.`;
}

/** 全量渲染视图 */
function renderView(identity) {
  currentIdentity = identity;
  const dataKey = getDataKey();
  const data = CONTENT[dataKey];

  setTheme(identity);
  renderNav(data);
  renderSections(data);
  renderFooter();

  document.getElementById('app').classList.add('visible');
  document.getElementById('picker-overlay').classList.add('hidden');
  document.querySelector('.site-logo').textContent = INFO.name;

  // 滚动到顶部
  window.scrollTo(0, 0);

  // 绑定导航Tab切换
  bindNavTabs();
}

// ===========================================================================
// IDENTITY SWITCH LOGIC
// ===========================================================================

/** 显示身份选择遮罩（首次进入） */
function showPicker() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('picker-overlay').classList.remove('hidden');
  document.getElementById('switch-modal').classList.add('hidden');
}

/** 显示切换弹窗（已进入网站后切换） */
function showSwitchModal() {
  document.getElementById('switch-modal').classList.remove('hidden');
}

/** 隐藏切换弹窗 */
function hideSwitchModal() {
  document.getElementById('switch-modal').classList.add('hidden');
}

/** 选择身份 */
function selectIdentity(identity) {
  setStoredIdentity(identity);
  renderView(identity);
  hideSwitchModal();
}

// ===========================================================================
// NAV TABS — 单板块切换
// ===========================================================================

function bindNavTabs() {
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('.nav-links a');
  const headerH = document.querySelector('.header').offsetHeight;

  // 默认显示第一个板块
  function showFirst() {
    if (sections.length === 0) return;
    sections.forEach(s => s.classList.remove('active'));
    sections[0].classList.add('active');
    navLinks.forEach(l => l.classList.remove('active'));
    if (navLinks[0]) navLinks[0].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  showFirst();

  // 导航点击切换
  navLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const id = this.getAttribute('href').slice(1);
      const target = document.getElementById(id);
      if (!target || target.classList.contains('active')) return;

      // 隐藏所有，显示目标
      sections.forEach(s => s.classList.remove('active'));
      target.classList.add('active');

      // 高亮当前导航
      navLinks.forEach(l => l.classList.remove('active'));
      this.classList.add('active');

      // 滚动到板块顶部
      const top = target.offsetTop - headerH - 20;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    });
  });
}

// ===========================================================================
// EVENT BINDINGS
// ===========================================================================

// 身份选择遮罩中的卡片点击
document.querySelectorAll('.picker-card').forEach(card => {
  card.addEventListener('click', () => selectIdentity(card.dataset.identity));
});

// 身份选择遮罩中的"随便看看"按钮
document.querySelector('.picker-skip').addEventListener('click', () => {
  selectIdentity('general');
});

// 导航栏切换身份按钮
document.getElementById('switch-btn').addEventListener('click', showSwitchModal);

// 切换弹窗中的身份卡片点击
document.querySelectorAll('.switch-modal__btn').forEach(btn => {
  btn.addEventListener('click', () => selectIdentity(btn.dataset.identity));
});

// 切换弹窗取消
document.getElementById('modal-cancel').addEventListener('click', hideSwitchModal);

// 点击弹窗遮罩关闭
document.getElementById('switch-modal').addEventListener('click', function(e) {
  if (e.target === this) hideSwitchModal();
});

// ===========================================================================
// INIT
// ===========================================================================

(function init() {
  const stored = getStoredIdentity();
  if (stored && (stored === 'hr' || stored === 'visitor' || stored === 'general')) {
    renderView(stored);
  } else {
    showPicker();
  }
})();
</script>
